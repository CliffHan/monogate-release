<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh-CN' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fonts.css@1.5.0/dist/fonts.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔷%3C/text%3E%3C/svg%3E">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6333958019987485" crossorigin="anonymous"></script>
    {% if page.layout == 'home' %}
    <style>
        /* Page-specific hero styles are in styles.css */
    </style>
    {% endif %}
</head>
<body class="{% if page.layout == 'home' %}home-page{% elsif page.layout == 'guide' %}guide-page{% else %}content-page{% endif %}">
    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        document.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
            const pre = code.parentElement;
            const graph = document.createElement('div');
            graph.className = 'mermaid';
            graph.textContent = code.textContent;
            pre.replaceWith(graph);
        });

        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            securityLevel: 'loose',
            themeVariables: {
                background: '#0a0a0f',
                primaryColor: '#13131a',
                primaryTextColor: '#e4e4e7',
                primaryBorderColor: 'rgba(99, 102, 241, 0.45)',
                lineColor: '#818cf8',
                secondaryColor: '#16161f',
                tertiaryColor: '#111118',
                fontFamily: '-apple-system, "Noto Sans", "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", sans-serif'
            }
        });
    </script>
</body>
</html>
